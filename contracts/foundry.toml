[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[profile.sepolia]
eth_rpc_url = "${SEPOLIA_RPC_URL}"

[profile.arbitrum-sepolia]
eth_rpc_url = "${ARBITRUM_SEPOLIA_RPC_URL}"

[profile.arbitrum]
eth_rpc_url = "${ARBITRUM_RPC_URL}"

[profile.mainnet]
eth_rpc_url = "${MAINNET_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
